name: Release

# Auto-publish a GitHub Release when a v* tag is pushed (or on manual dispatch).
# Mirrors the ctrsploit release workflow, adapted for fake-nvidia:
#   - fake-nvidia ships no portable binaries (the .ko is kernel-specific and the
#     shim .so is only useful alongside a matching kernel module), so releases are
#     source-only. GitHub attaches the Source code zip/tar.gz automatically.
#   - The release body and title come from docs/release-notes/<tag>.md, which must
#     exist at the tagged commit (same convention as ctrsploit).
#   - tags containing '-' (e.g. v0.8.0-beta.0, v0.7.3-rc.1) are published as
#     pre-release; plain versions are published as latest.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release, for example v0.8.0-beta.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "release tag is empty" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "notes=docs/release-notes/${tag}.md" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Validate release inputs
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          notes="${{ steps.release.outputs.notes }}"

          git rev-parse "${tag}^{commit}" >/dev/null

          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse "${tag}^{commit}")" ]]; then
            echo "checked out HEAD does not match ${tag}" >&2
            exit 1
          fi

          if [[ ! -f "${notes}" ]]; then
            echo "missing release notes: ${notes}" >&2
            echo "add ${notes} (see docs/release-notes/) before tagging ${tag}" >&2
            exit 1
          fi

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          notes="${{ steps.release.outputs.notes }}"
          body="${RUNNER_TEMP}/release-notes-body.md"
          # Title is the first "# ..." line of the notes file, e.g.
          # "# v0.8.0-beta.0: NVML GetHandleByUUID symbols ..." -> "v0.8.0-beta.0: ..."
          title="$(head -n 1 "${notes}" | sed -E 's/^#[[:space:]]*//; s/^[[:space:]]+//; s/[[:space:]]+$//')"

          if [[ -z "${title}" ]]; then
            echo "release note title is empty: ${notes}" >&2
            exit 1
          fi

          # Body is everything after the title line, dropping the first blank line.
          tail -n +2 "${notes}" | sed '1{/^$/d;}' > "${body}"

          echo "Release title: ${title}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          echo "body=${body}" >> "${GITHUB_OUTPUT}"

      - name: Build smoke-test (userspace NVML shim)
        # Compile gate, not a shipped artifact: proves the tagged source builds.
        # Only the shim is built; the kernel module needs target-kernel headers and
        # is not portable, so it is intentionally not compiled here.
        run: |
          make libfake_nvml.so
          test -s libfake_nvml.so
          file libfake_nvml.so
          nm -D libfake_nvml.so | grep -q ' T nvml'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release_notes.outputs.title }}
          body_path: ${{ steps.release_notes.outputs.body }}
          prerelease: ${{ contains(steps.release.outputs.tag, '-') }}
          make_latest: ${{ contains(steps.release.outputs.tag, '-') && 'false' || 'true' }}
